# =============================================================
# Prometheus Configuration
# =============================================================
# Prometheus uses this file to know WHAT to scrape and HOW often.
# =============================================================

global:
  scrape_interval: 15s        # Pull metrics every 15 seconds
  evaluation_interval: 15s    # Evaluate alerting rules every 15 seconds
  scrape_timeout: 10s

# =============================================================
# Alerting Configuration
# =============================================================
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# =============================================================
# Scrape Configurations
# Each "job" is a source of metrics that Prometheus pulls from.
# =============================================================
scrape_configs:

  # Prometheus monitors itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Our Node.js application
  # This tells Prometheus: "Go to http://app:3000/metrics every 15s
  # and store the metrics you find."
  - job_name: 'secure-app'
    metrics_path: '/metrics'    # Our app exposes metrics here (Phase 6)
    scrape_interval: 15s
    static_configs:
      - targets: ['app:3000']
        labels:
          environment: 'production'
          service: 'secure-devsecops-app'

  # Node Exporter — system-level metrics (CPU, RAM, disk)
  # Install on EC2: docker run -d --net=host prom/node-exporter
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          environment: 'production'
          instance: 'ec2-primary'
