# =============================================================
# GitHub Actions CI/CD Pipeline — Complete DevSecOps Workflow
# =============================================================
#
# WHAT IS THIS FILE?
# GitHub Actions reads this YAML file and runs the steps
# automatically whenever you push code to GitHub.
#
# WORKFLOW OVERVIEW:
#   Job 1: test        → Install, lint, and run unit tests
#   Job 2: docker-build → Build Docker image + run Trivy security scan
#   Job 3: zap-scan    → Launch container + run OWASP ZAP DAST (on main only)
#   Job 4: deploy      → SSH into EC2 and deploy (on main only)
#
# Each job runs on GitHub's servers (Ubuntu runners) — FREE for public repos.
# =============================================================

name:  DevSecOps Pipeline

# TRIGGER: When does the pipeline run?
on:
  push:
    branches: [ "main", "develop" ]    # Run on push to main or develop
  pull_request:
    branches: [ "main" ]               # Run on PRs targeting main
  workflow_dispatch:                   # Allow manual trigger from GitHub UI

# Least-privilege permissions for the entire workflow
permissions:
  contents: read        # Read repo code
  security-events: write # Upload SARIF security reports to GitHub Security tab

# =============================================================
# ENVIRONMENT VARIABLES
# Referenced throughout jobs, defined once here.
# Secrets come from GitHub → Settings → Secrets and Variables.
# =============================================================
env:
  IMAGE_NAME: secure-devsecops-app
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  NODE_VERSION: '22'

# =============================================================
# JOB 1: Test
# Runs on every push and PR.
# PURPOSE: Ensure code quality and correctness before building.
# =============================================================
jobs:
  test:
    name:  Test & Lint
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout your code
      - name:  Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name:  Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # Step 3: Install dependencies
      - name:  Install dependencies
        run: npm ci

      # Step 4: Lint the code
      - name:  Lint code
        run: npm run lint

      # Step 5: Run unit tests with coverage
      - name:  Run tests with coverage
        run: npm test

      # Step 6: Upload coverage report as artifact
      - name:  Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

# =============================================================
# JOB 2: Docker Build + Trivy Security Scan
# Runs after tests pass.
# PURPOSE: Build the container image and scan it for CVEs.
# =============================================================
  docker-build:
    name:  Docker Build +  Trivy Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name:  Checkout code
        uses: actions/checkout@v4

      - name:  Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ️ Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name:  Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          trivyignores: '.trivyignore'

      - name:  Upload Trivy scan results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name:  Trivy scan summary (table format)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name:  Login to Docker Hub
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name:  Push image to Docker Hub
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# =============================================================
# JOB 3: OWASP ZAP Dynamic Application Security Testing (DAST)
# =============================================================
  zap-scan:
    name: ️ OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name:  Checkout code
        uses: actions/checkout@v4

      - name:  Start application container
        run: |
          docker pull ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker run -d \
            --name target-app \
            -p 3000:3000 \
            -e NODE_ENV=production \
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo " App is healthy!"
              break
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 2
          done

      - name: ️ Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: warn

      - name:  Upload ZAP scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
          retention-days: 7

      - name:  Stop application container
        if: always()
        run: docker stop target-app && docker rm target-app

# =============================================================
# JOB 4: Deploy to AWS EC2
# =============================================================
  deploy:
    name:  Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [ docker-build, zap-scan ]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name:  Checkout code
        uses: actions/checkout@v4

      - name: ️ Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            docker pull ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            docker stop secure-app || true
            docker rm secure-app || true
            docker run -d \
              --name secure-app \
              --restart unless-stopped \
              -p 80:3000 \
              -e NODE_ENV=production \
              ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            sleep 5
            docker ps | grep secure-app
            curl -sf http://localhost/health && echo " Deployment successful!" || echo " Health check failed!"
            docker image prune -f
