# =============================================================
# GitHub Actions CI/CD Pipeline — Complete DevSecOps Workflow
# =============================================================
#
# WHAT IS THIS FILE?
# GitHub Actions reads this YAML file and runs the steps
# automatically whenever you push code to GitHub.
#
# WORKFLOW OVERVIEW:
#   Job 1: test        → Install, lint, and run unit tests
#   Job 2: docker-build → Build Docker image + run Trivy security scan
#   Job 3: zap-scan    → Launch container + run OWASP ZAP DAST (on main only)
#   Job 4: deploy      → SSH into EC2 and deploy (on main only)
#
# Each job runs on GitHub's servers (Ubuntu runners) — FREE for public repos.
# =============================================================


name: 🔐 DevSecOps Pipeline


# TRIGGER: When does the pipeline run?
on:
  push:
    branches: [ "main", "develop" ]    # Run on push to main or develop
  pull_request:
    branches: [ "main" ]               # Run on PRs targeting main
  workflow_dispatch:                   # Allow manual trigger from GitHub UI


# Least-privilege permissions for the entire workflow
permissions:
  contents: read                       # Read repo code
  security-events: write              # Upload SARIF security reports to GitHub Security tab


# =============================================================
# ENVIRONMENT VARIABLES
# Referenced throughout jobs, defined once here.
# Secrets come from GitHub → Settings → Secrets and Variables.
