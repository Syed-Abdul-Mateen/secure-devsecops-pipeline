# =============================================================
# GitHub Actions CI/CD Pipeline — Complete DevSecOps Workflow
# =============================================================
#
# WHAT IS THIS FILE?
# GitHub Actions reads this YAML file and runs the steps
# automatically whenever you push code to GitHub.
#
# WORKFLOW OVERVIEW:
#   Job 1: test        → Install, lint, and run unit tests
#   Job 2: docker-build → Build Docker image + run Trivy security scan
#   Job 3: zap-scan    → Launch container + run OWASP ZAP DAST (on main only)
#   Job 4: deploy      → SSH into EC2 and deploy (on main only)
#
# Each job runs on GitHub's servers (Ubuntu runners) — FREE for public repos.
# =============================================================

name: 🔐 DevSecOps Pipeline

# TRIGGER: When does the pipeline run?
on:
  push:
    branches: [ "main", "develop" ]    # Run on push to main or develop
  pull_request:
    branches: [ "main" ]               # Run on PRs targeting main
  workflow_dispatch:                   # Allow manual trigger from GitHub UI

# Least-privilege permissions for the entire workflow
permissions:
  contents: read                       # Read repo code
  security-events: write              # Upload SARIF security reports to GitHub Security tab

# =============================================================
# ENVIRONMENT VARIABLES
# Referenced throughout jobs, defined once here.
# Secrets come from GitHub → Settings → Secrets and Variables.
# =============================================================
env:
  IMAGE_NAME: secure-devsecops-app
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  NODE_VERSION: '22'

# =============================================================
# JOB 1: Test
# Runs on every push and PR.
# PURPOSE: Ensure code quality and correctness before building.
# =============================================================
jobs:
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your code
      # WHY? The runner starts with an empty workspace.
      # actions/checkout downloads your repository code.
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      # WHY cache? npm install downloads ~448 packages.
      # Caching saves 30-60 seconds per run.
      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # Step 3: Install dependencies
      # WHY npm ci instead of npm install?
      # ci = "clean install" — uses exact versions from package-lock.json
      # Guarantees the same versions that passed tests locally
      - name: 📦 Install dependencies
        run: npm ci

      # Step 4: Lint the code
      # WHY lint in CI? If a developer skips linting locally,
      # the pipeline catches it and blocks the merge.
      - name: 🔍 Lint code
        run: npm run lint

      # Step 5: Run unit tests with coverage
      # WHY coverage in CI? Track which lines aren't tested.
      # Our threshold is 50% — below that, the build fails.
      - name: 🧪 Run tests with coverage
        run: npm test

      # Step 6: Upload coverage report as artifact
      # WHY? Preserves coverage reports for review after the run.
      # Find them under Actions → Run → Artifacts.
      - name: 📊 Upload coverage report
        if: always()    # Upload even if tests fail (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # =============================================================
  # JOB 2: Docker Build + Trivy Security Scan
  # Runs after tests pass.
  # PURPOSE: Build the container image and scan it for CVEs.
  # =============================================================
  docker-build:
    name: 🐳 Docker Build + 🔒 Trivy Scan
    runs-on: ubuntu-latest
    needs: test    # Only runs if the 'test' job passes

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Enable Docker BuildKit for faster, more efficient builds
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the Docker image (multi-stage Dockerfile)
      # Stage 1 (builder): installs all deps + runs npm test
      # Stage 2 (production): copies only src/, installs prod deps only
      # Trivy scans the FINAL image = Stage 2 only (no dev deps, no test files)
      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: Dockerfile
          push: false                     # Don't push yet — scan first
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          load: true                      # Load into local Docker daemon for scanning
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =============================================================
      # TRIVY CONTAINER SCANNING
      # =============================================================
      # WHAT IS TRIVY?
      # Trivy is an open-source vulnerability scanner by Aqua Security.
      # It scans your Docker image and checks every OS package and
      # Node.js dependency against the CVE (Common Vulnerabilities and
      # Exposures) database.
      #
      # WHAT CAN IT FIND?
      #   - CVE-2021-44228 (Log4Shell) in Java libraries
      #   - Known vulnerable npm packages (e.g., lodash prototype pollution)
      #   - Outdated OS packages with known exploits
      #   - Secrets accidentally baked into the image (API keys, passwords)
      #
      # HOW DOES IT WORK?
      # Trivy pulls a database of known vulnerabilities (updated daily)
      # and checks each package in your image against it.
      # It reports: CVE ID, severity (CRITICAL/HIGH/MEDIUM/LOW), package,
      # version, and the fixed version to upgrade to.
      #
      # SEVERITY LEVELS:
      #   CRITICAL — Active exploits exist, patch immediately
      #   HIGH     — Likely to be exploited, patch this week
      #   MEDIUM   — Needs patching, lower urgency
      #   LOW      — Informational, patch when convenient
      # =============================================================
      - name: 🔒 Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'           # Only fail on CRITICAL and HIGH
          exit-code: '1'                      # Fail pipeline if found
          ignore-unfixed: true                # Skip CVEs with no fix yet
          vuln-type: 'os,library'
          trivyignores: '.trivyignore'        # Our documented ignore list

      # WHY upload SARIF? GitHub Security tab reads SARIF files and
      # integrates them into the "Security" tab of your repo.
      # You can see vulnerabilities without leaving GitHub.
      - name: 📤 Upload Trivy scan results to GitHub Security
        if: always()    # Upload even if scan found issues (for visibility)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      # Also run Trivy in table format for readable logs
      - name: 📋 Trivy scan summary (table format)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'                      # Don't fail here — just for display

      # =============================================================
      # Push to Docker Hub ONLY if:
      #   1. We're on the main branch
      #   2. Trivy scan passed (no CRITICAL/HIGH vulns)
      # =============================================================
      - name: 🔑 Login to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          # WHY secrets? Never put credentials in YAML files!
          # GitHub Secrets encrypts these and masks them in logs.

      - name: 🚀 Push image to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =============================================================
  # JOB 3: OWASP ZAP Dynamic Application Security Testing (DAST)
  # ONLY runs on pushes to main (not PRs — ZAP needs a running app)
  # =============================================================
  zap-scan:
    name: 🕷️ OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    needs: docker-build    # Only after image is built and scanned
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Start the application container in the background
      # WHY? ZAP needs a RUNNING app to test against.
      # Unlike Trivy (which scans the static image), ZAP
      # actually SENDS HTTP requests and looks at responses.
      - name: 🏃 Start application container
        run: |
          docker pull ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker run -d \
            --name target-app \
            -p 3000:3000 \
            -e NODE_ENV=production \
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          
          # Wait for app to be healthy
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "✅ App is healthy!"
              break
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 2
          done

      # =============================================================
      # OWASP ZAP BASELINE SCAN
      # =============================================================
      # WHAT IS OWASP ZAP?
      # ZAP (Zed Attack Proxy) is an open-source DAST (Dynamic Application
      # Security Testing) tool from OWASP. It acts as a "friendly hacker"
      # that attacks your running application and reports what it finds.
      #
      # WHAT CAN IT FIND?
      #   - Cross-Site Scripting (XSS)
      #   - SQL Injection
      #   - Missing security headers
      #   - Broken authentication
      #   - Sensitive data exposure
      #   - CSRF vulnerabilities
      #   - Path traversal
      #   - Open redirects
      #
      # SCAN TYPES:
      #   Baseline Scan: Passive only — doesn't actively attack. Safe for CI/CD.
      #   Full Scan: Active attack — finds more but can break the app. Use with caution.
      #   API Scan: Focused on REST APIs. Best for our use case.
      #
      # We use Baseline Scan in CI/CD (safe) — save Full Scan for staging.
      # =============================================================
      - name: 🕷️ Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'    # Custom ignore rules (created below)
          cmd_options: '-a'                     # Include alpha passive rules
          fail_action: warn                     # warn = don't fail pipeline, just report
          # Change to 'true' to fail pipeline on ZAP findings
          # In Phase 4, we'll tune this to 'true' once headers are fixed

      # Upload ZAP report
      - name: 📤 Upload ZAP scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
          retention-days: 7

      # Stop the test container
      - name: 🛑 Stop application container
        if: always()
        run: docker stop target-app && docker rm target-app

  # =============================================================
  # JOB 4: Deploy to AWS EC2
  # ONLY runs on main, after ALL security scans pass
  # =============================================================
  deploy:
    name: 🚀 Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [ docker-build, zap-scan ]    # Wait for build AND security scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # SSH into EC2 and deploy the new image
      # WHY SSH? We connect to EC2, pull the new image, and restart the container.
      # This is simple but effective for a single-server deployment.
      # (In production you'd use ECS, EKS, or an auto-scaling group)
      - name: 🖥️ Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          # WHY private key in Secrets? The EC2 key pair (.pem file)
          # gives SSH access to your server. If leaked, anyone can access your server.
          script: |
            # Pull the latest image
            docker pull ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            
            # Stop the current container (ignore error if not running)
            docker stop secure-app || true
            docker rm secure-app || true
            
            # Start new container
            docker run -d \
              --name secure-app \
              --restart unless-stopped \
              -p 80:3000 \
              -e NODE_ENV=production \
              ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            
            # Verify deployment
            sleep 5
            docker ps | grep secure-app
            curl -sf http://localhost/health && echo "✅ Deployment successful!" || echo "❌ Health check failed!"
            
            # Clean up old images
            docker image prune -f
